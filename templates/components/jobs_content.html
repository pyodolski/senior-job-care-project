<!-- 통합 구인구직 페이지 컴포넌트 -->
<div class="jobs-page-container">
  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">구인구직</h1>
      <p class="page-subtitle">다양한 일자리 정보를 확인하고 지원하세요</p>
    </div>
    <div class="header-actions">
      <button
        id="refresh-jobs-btn"
        class="action-btn secondary"
        title="새로고침"
      >
        <span class="icon">🔄</span>
        <span class="label">새로고침</span>
      </button>
      <button
        id="create-job-btn"
        class="action-btn primary"
        title="공고 등록"
        style="display: none"
      >
        <span class="icon">✍️</span>
        <span class="label">공고 등록</span>
      </button>
    </div>
  </div>

  <!-- 필터 및 검색 영역 -->
  <div class="filter-section">
    <div class="search-container">
      <div class="search-input-group">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="job-search-input"
          placeholder="키워드로 검색 (제목, 내용, 회사명)"
          maxlength="100"
        />
        <button id="clear-search-btn" class="clear-btn" title="검색어 지우기">
          ✕
        </button>
      </div>
      <button id="search-jobs-btn" class="search-btn">검색</button>
    </div>

    <div class="filter-controls">
      <div class="filter-group">
        <label for="region-filter">지역</label>
        <select id="region-filter">
          <option value="">전체 지역</option>
          <option value="서울">서울</option>
          <option value="경기">경기</option>
          <option value="인천">인천</option>
          <option value="부산">부산</option>
          <option value="대구">대구</option>
          <option value="광주">광주</option>
          <option value="대전">대전</option>
          <option value="울산">울산</option>
        </select>
      </div>

      <div class="filter-group">
        <label>
          <input type="checkbox" id="senior-only-filter" />
          <span class="checkmark"></span>
          시니어 우대
        </label>
      </div>

      <div class="filter-group">
        <label for="age-filter">나이</label>
        <input
          type="number"
          id="age-filter"
          min="14"
          max="100"
          placeholder="나이"
        />
      </div>

      <button id="reset-filters-btn" class="reset-btn">필터 초기화</button>
    </div>
  </div>

  <!-- 현재 상태 표시 -->
  <div class="status-section">
    <div class="view-mode-indicators">
      <span id="list-mode-indicator" class="mode-indicator active"
        >목록 보기</span
      >
      <span id="form-mode-indicator" class="mode-indicator">공고 등록</span>
      <span id="detail-mode-indicator" class="mode-indicator">상세 보기</span>
    </div>
    <div class="result-summary">
      <span id="job-count-display">로딩 중...</span>
    </div>
  </div>

  <!-- 메인 콘텐츠 영역 -->
  <div class="main-content">
    <!-- 공고 목록 뷰 -->
    <div id="jobs-list-view" class="content-view active">
      <div class="loading-placeholder" id="jobs-loading">
        <div class="loading-spinner"></div>
        <p>공고 목록을 불러오는 중...</p>
      </div>

      <div class="jobs-grid" id="jobs-grid" style="display: none">
        <!-- 동적으로 생성되는 공고 카드들 -->
      </div>

      <div class="empty-state" id="jobs-empty" style="display: none">
        <div class="empty-icon">📋</div>
        <h3>등록된 공고가 없습니다</h3>
        <p>조건에 맞는 공고를 찾을 수 없습니다. 필터를 조정해보세요.</p>
      </div>

      <!-- 페이지네이션 -->
      <div
        class="pagination-container"
        id="pagination-container"
        style="display: none"
      >
        <button id="prev-page-btn" class="page-btn" disabled>이전</button>
        <span id="page-info">1 / 1</span>
        <button id="next-page-btn" class="page-btn" disabled>다음</button>
      </div>
    </div>

    <!-- 공고 등록/수정 폼 뷰 -->
    <div id="jobs-form-view" class="content-view">
      <div class="form-header">
        <h2 id="form-title">새 공고 등록</h2>
        <button id="cancel-form-btn" class="action-btn secondary">
          <span class="icon">✕</span>
          <span class="label">취소</span>
        </button>
      </div>

      <form id="job-form" class="job-form">
        <div class="form-row">
          <div class="form-group">
            <label for="job-title">제목 <span class="required">*</span></label>
            <input
              type="text"
              id="job-title"
              name="title"
              required
              maxlength="200"
              placeholder="공고 제목을 입력하세요"
            />
            <div class="field-error" id="title-error"></div>
          </div>

          <div class="form-group">
            <label for="job-company"
              >회사명 <span class="required">*</span></label
            >
            <input
              type="text"
              id="job-company"
              name="company"
              required
              maxlength="100"
              placeholder="회사명을 입력하세요"
            />
            <div class="field-error" id="company-error"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="job-description"
            >상세 내용 <span class="required">*</span></label
          >
          <textarea
            id="job-description"
            name="description"
            required
            maxlength="2000"
            rows="6"
            placeholder="업무 내용, 자격 요건, 근무 조건 등을 상세히 입력하세요"
          ></textarea>
          <div class="field-error" id="description-error"></div>
          <div class="char-count">
            <span id="description-count">0</span> / 2000
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="job-age-min">최소 연령</label>
            <input
              type="number"
              id="job-age-min"
              name="preferred_age_min"
              min="14"
              max="100"
              placeholder="최소 연령"
            />
            <div class="field-error" id="age-min-error"></div>
          </div>

          <div class="form-group">
            <label for="job-age-max">최대 연령</label>
            <input
              type="number"
              id="job-age-max"
              name="preferred_age_max"
              min="14"
              max="100"
              placeholder="최대 연령"
            />
            <div class="field-error" id="age-max-error"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="job-region">근무 지역</label>
            <input
              type="text"
              id="job-region"
              name="region"
              maxlength="50"
              placeholder="예: 서울 강남구"
            />
            <div class="field-error" id="region-error"></div>
          </div>

          <div class="form-group">
            <label for="job-work-hours">근무 시간</label>
            <input
              type="text"
              id="job-work-hours"
              name="work_hours"
              maxlength="100"
              placeholder="예: 오전 9시 ~ 오후 6시"
            />
            <div class="field-error" id="work-hours-error"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="job-contact-phone">연락처</label>
            <input
              type="tel"
              id="job-contact-phone"
              name="contact_phone"
              maxlength="20"
              placeholder="010-XXXX-XXXX"
              pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"
            />
            <div class="field-error" id="contact-phone-error"></div>
          </div>

          <div class="form-group">
            <label class="checkbox-label">
              <input
                type="checkbox"
                id="job-senior-friendly"
                name="is_senior_friendly"
              />
              <span class="checkmark"></span>
              시니어 친화적 공고
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button
            type="button"
            id="save-draft-btn"
            class="action-btn secondary"
          >
            <span class="icon">💾</span>
            <span class="label">임시저장</span>
          </button>
          <button type="submit" id="submit-job-btn" class="action-btn primary">
            <span class="icon">✅</span>
            <span class="label">등록하기</span>
          </button>
        </div>
      </form>
    </div>

    <!-- 공고 상세 보기 뷰 -->
    <div id="jobs-detail-view" class="content-view">
      <div class="detail-header">
        <button id="back-to-list-btn" class="action-btn secondary">
          <span class="icon">←</span>
          <span class="label">목록으로</span>
        </button>
        <div class="detail-actions">
          <button
            id="edit-job-btn"
            class="action-btn primary"
            style="display: none"
          >
            <span class="icon">✏️</span>
            <span class="label">수정</span>
          </button>
          <button
            id="delete-job-btn"
            class="action-btn danger"
            style="display: none"
          >
            <span class="icon">🗑️</span>
            <span class="label">삭제</span>
          </button>
        </div>
      </div>

      <div class="job-detail-content" id="job-detail-content">
        <!-- 동적으로 생성되는 상세 내용 -->
      </div>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="delete-confirmation-modal" class="modal" style="display: none">
  <div class="modal-content">
    <div class="modal-header">
      <h3>공고 삭제 확인</h3>
      <button class="modal-close" id="delete-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p>정말로 이 공고를 삭제하시겠습니까?</p>
      <p class="warning-text">삭제된 공고는 복구할 수 없습니다.</p>
    </div>
    <div class="modal-actions">
      <button id="confirm-delete-btn" class="action-btn danger">삭제</button>
      <button id="cancel-delete-btn" class="action-btn secondary">취소</button>
    </div>
  </div>
</div>

<!-- 로딩 오버레이 -->
<div id="jobs-loading-overlay" class="loading-overlay" style="display: none">
  <div class="loading-content">
    <div class="loading-spinner large"></div>
    <p>처리 중...</p>
  </div>
</div>

    white-space: nowrap;
  }

  .action-btn.primary {
    background: linear-gradient(135deg, #007bff, #0056b3);
    color: white;
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
  }

  .action-btn.primary:hover {
    background: linear-gradient(135deg, #0056b3, #004085);

    box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
  }

  .action-btn.secondary {

  }

    background: #e9ecef;
    color: #495057;
  }

  .action-btn.danger {
    background: linear-gradient(135deg, #dc3545, #c82333);
    color: white;
    box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);

  .action-btn.danger:hover {
